<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nave Espacial</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; }
        canvas { display: block; background: radial-gradient(circle, #1b2735 0%, #090a0f 100%); }
        #p { position: absolute; top: 15px; left: 15px; color: #FFF; font-size: 24px; font-family: sans-serif; font-weight: bold; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="p">Puntos: 0</div>
    <canvas id="j"></canvas>
    <script>
        const c = document.getElementById("j"), x = c.getContext("2d"), m = document.getElementById("p");
        c.width = window.innerWidth; c.height = window.innerHeight;

        const stars = [];
        for(let i=0; i<120; i++) stars.push({x: Math.random()*c.width, y: Math.random()*c.height, r: Math.random()*1.5+0.3, speed: Math.random()*0.4+0.1});

        let pts = 0, j = {x: c.width/2-22, y: c.height-100, w: 44, h: 54, inv: 0, tilt: 0, thrust: 0};
        let bls = [], ens = [], parts = [], animFrame = 0;
        let keys = {}, shotTimer = 0;

        function drawShip(sx, sy, sw, sh, inv, thrust, tilt) {
            const a = (inv > 0 && Math.floor(inv/7)%2===0) ? 0.25 : 1;
            x.save(); x.globalAlpha = a;
            x.translate(sx+sw/2, sy+sh/2);
            x.rotate(tilt * 0.18);
            const cx=0, cy=0, w=sw, h=sh;
            x.beginPath();
            x.moveTo(cx, cy-h/2+2);
            x.lineTo(cx+w*0.25, cy+h*0.2);
            x.lineTo(cx+w*0.5, cy+h*0.45);
            x.lineTo(cx-w*0.5, cy+h*0.45);
            x.lineTo(cx-w*0.25, cy+h*0.2);
            x.closePath();
            const bg = x.createLinearGradient(cx-w*0.5, cy-h/2, cx+w*0.5, cy+h/2);
            bg.addColorStop(0,'#3366ee'); bg.addColorStop(0.5,'#2244cc'); bg.addColorStop(1,'#112288');
            x.fillStyle = bg; x.fill();
            x.strokeStyle='#6699ff'; x.lineWidth=1; x.stroke();
            [1,-1].forEach(s => {
                x.beginPath();
                x.moveTo(cx+s*w*0.25, cy+h*0.1);
                x.lineTo(cx+s*w*0.5, cy+h*0.22);
                x.lineTo(cx+s*w*0.5, cy+h*0.45);
                x.lineTo(cx+s*w*0.22, cy+h*0.45);
                x.closePath();
                const wg = x.createLinearGradient(0,cy,cx+s*w*0.5,cy+h*0.45);
                wg.addColorStop(0,'#1a44bb'); wg.addColorStop(1,'#0a1a66');
                x.fillStyle=wg; x.fill();
                x.strokeStyle='#4477dd'; x.lineWidth=0.8; x.stroke();
            });
            x.beginPath(); x.ellipse(cx, cy-h*0.1, w*0.14, h*0.18, 0, 0, Math.PI*2);
            const cg = x.createRadialGradient(cx-3,cy-h*0.15,1,cx,cy-h*0.1,w*0.14);
            cg.addColorStop(0,'#cceeff'); cg.addColorStop(1,'#4488cc');
            x.fillStyle=cg; x.fill();
            x.strokeStyle='#88ccff'; x.lineWidth=1; x.stroke();
            [-w*0.28, 0, w*0.28].forEach((ox, idx) => {
                const flH = 12 + Math.sin(animFrame*0.3+idx)*5 + thrust*8;
                const fg = x.createLinearGradient(cx+ox,cy+h*0.45,cx+ox,cy+h*0.45+flH);
                fg.addColorStop(0,'#ffcc00'); fg.addColorStop(0.4,'#ff6600'); fg.addColorStop(1,'rgba(255,60,0,0)');
                x.beginPath();
                x.moveTo(cx+ox-6, cy+h*0.45);
                x.lineTo(cx+ox+6, cy+h*0.45);
                x.lineTo(cx+ox, cy+h*0.45+flH);
                x.closePath(); x.fillStyle=fg; x.fill();
            });
            x.restore();
        }

        function makeAsteroid() {
            const r = Math.random()*20+18;
            const sides = Math.floor(Math.random()*5)+7;
            const pts = [];
            for(let i=0;i<sides;i++){
                const a=(i/sides)*Math.PI*2;
                pts.push({x:Math.cos(a)*(r*(0.65+Math.random()*0.45)),y:Math.sin(a)*(r*(0.65+Math.random()*0.45))});
            }
            const craters = Array.from({length:3},()=>{
                const a=Math.random()*Math.PI*2,d=Math.random()*r*0.4;
                return{x:Math.cos(a)*d,y:Math.sin(a)*d,r:Math.random()*4+2};
            });
            return{x:Math.random()*(c.width-r*2),y:-r*2,r,pts,craters,w:r*2,h:r*2,
                vy:Math.random()*2+2,vx:(Math.random()-0.5)*1.2,rot:0,rotSpd:(Math.random()-0.5)*0.05};
        }

        function drawAsteroid(a) {
            x.save(); x.translate(a.x+a.r,a.y+a.r); x.rotate(a.rot);
            x.beginPath(); x.moveTo(a.pts[0].x,a.pts[0].y);
            for(let i=1;i<a.pts.length;i++) x.lineTo(a.pts[i].x,a.pts[i].y);
            x.closePath();
            const ag = x.createRadialGradient(0,0,a.r*0.1,0,0,a.r);
            ag.addColorStop(0,'#b0a070'); ag.addColorStop(1,'#5a4a30');
            x.fillStyle=ag; x.fill();
            x.strokeStyle='#aaa'; x.lineWidth=1.5; x.stroke();
            a.craters.forEach(cr=>{
                x.beginPath(); x.arc(cr.x,cr.y,cr.r,0,Math.PI*2);
                x.fillStyle='rgba(0,0,0,0.35)'; x.fill();
            });
            x.restore();
        }

        function spawnParticles(px, py, colors) {
            for(let i=0;i<12;i++){
                const a=Math.random()*Math.PI*2,spd=Math.random()*5+1;
                parts.push({x:px,y:py,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,c:colors[Math.floor(Math.random()*colors.length)],r:Math.random()*4+1.5});
            }
        }

        let atkTimer=0, lastTime=0;
        function loop(now) {
            animFrame++;
            const dt = Math.min(now-lastTime,50); lastTime=now;
            x.clearRect(0,0,c.width,c.height);
            stars.forEach(s=>{
                s.y+=s.speed; if(s.y>c.height){s.y=0;s.x=Math.random()*c.width;}
                x.globalAlpha=0.8; x.fillStyle='#fff';
                x.beginPath(); x.arc(s.x,s.y,s.r,0,Math.PI*2); x.fill();
            });
            x.globalAlpha=1;
            let tilt=0,thrust=0;
            if(keys['ArrowLeft']||keys['a']){j.x-=6;tilt=-1;}
            if(keys['ArrowRight']||keys['d']){j.x+=6;tilt=1;}
            if(keys['ArrowUp']||keys['w']){j.y-=6;thrust=1;}
            if(keys['ArrowDown']||keys['s']){j.y+=6;}
            j.tilt+=(tilt-j.tilt)*0.2; j.thrust+=(thrust-j.thrust)*0.15;
            j.x=Math.max(0,Math.min(c.width-j.w,j.x));
            j.y=Math.max(0,Math.min(c.height-j.h,j.y));
            if(j.inv>0) j.inv--;
            shotTimer+=dt;
            if(shotTimer>300){
                bls.push({x:j.x+j.w/2-3,y:j.y,vx:0,vy:-14,w:6,h:18});
                shotTimer=0;
            }
            atkTimer+=dt;
            if(atkTimer>900){ens.push(makeAsteroid());atkTimer=0;}
            bls.forEach((b,i)=>{b.x+=b.vx;b.y+=b.vy;if(b.y<-30)bls.splice(i,1);});
            ens.forEach((e,ei)=>{
                e.x+=e.vx; e.y+=e.vy; e.rot+=e.rotSpd;
                if(e.y>c.height+60){ens.splice(ei,1);return;}
                bls.forEach((b,bi)=>{
                    if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){
                        spawnParticles(e.x+e.r,e.y+e.r,['#c0a060','#806040','#ffcc44']);
                        ens.splice(ei,1);bls.splice(bi,1);pts+=20;m.innerText='Puntos: '+pts;
                    }
                });
                if(j.inv<=0&&j.x<e.x+e.w&&j.x+j.w>e.x&&j.y<e.y+e.h&&j.y+j.h>e.y){
                    spawnParticles(j.x+j.w/2,j.y+j.h/2,['#4488ff','#88aaff']);
                    ens.splice(ei,1);j.inv=100;
                }
            });
            bls.forEach(b=>{
                const bg=x.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
                bg.addColorStop(0,'#ffffff');bg.addColorStop(0.3,'#aaddff');bg.addColorStop(1,'rgba(0,120,255,0)');
                x.fillStyle=bg;x.beginPath();x.roundRect(b.x,b.y,b.w,b.h,3);x.fill();
            });
            ens.forEach(e=>drawAsteroid(e));
            drawShip(j.x,j.y,j.w,j.h,j.inv,j.thrust,j.tilt);
            parts.forEach((p,i)=>{
                p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.025;
                if(p.life<=0){parts.splice(i,1);return;}
                x.globalAlpha=p.life;
                x.beginPath();x.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
                x.fillStyle=p.c;x.fill();
            });
            x.globalAlpha=1;
            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault();});
        window.addEventListener('keyup',e=>{keys[e.key]=false;});
        c.addEventListener('touchmove',e=>{
            e.preventDefault();
            const t=e.touches[0];
            j.x=t.clientX-j.w/2;j.y=t.clientY-j.h/2;
        },{passive:false});
        c.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
        requestAnimationFrame(loop);
    </script>
</body>
</html>
