<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Juego</title>
<style>
body{margin:0;overflow:hidden;background:#050510;}
canvas{display:block;}
#p{position:absolute;top:15px;left:15px;color:#FFF;font-size:22px;font-family:sans-serif;font-weight:bold;}
</style>
</head>
<body>
<div id="p">Puntos: 0</div>
<canvas id="j"></canvas>
<script>
const c=document.getElementById("j"),x=c.getContext("2d"),m=document.getElementById("p");
c.width=window.innerWidth;c.height=window.innerHeight;
let pts=0,ship={x:c.width/2-22,y:c.height-100,w:44,h:54};
let bls=[],ens=[],stars=[];
for(let i=0;i<120;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+0.3,s:Math.random()*0.5+0.1});
function asteroid(){
  const r=Math.random()*20+18,sides=Math.floor(Math.random()*5)+7,pts=[];
  for(let i=0;i<sides;i++){const a=(i/sides)*Math.PI*2;pts.push({x:Math.cos(a)*(r*(0.7+Math.random()*0.4)),y:Math.sin(a)*(r*(0.7+Math.random()*0.4))});}
  return{x:Math.random()*(c.width-r*2),y:-r*2,r,pts,w:r*2,h:r*2,vy:Math.random()*2+2,rot:0,rs:(Math.random()-0.5)*0.05};
}
setInterval(()=>ens.push(asteroid()),900);
c.addEventListener("touchmove",e=>{ship.x=e.touches[0].clientX-ship.w/2;ship.y=e.touches[0].clientY-ship.h/2;e.preventDefault();},{passive:false});
let shot=0;
function loop(t){
  x.clearRect(0,0,c.width,c.height);
  stars.forEach(s=>{s.y+=s.s;if(s.y>c.height)s.y=0;x.fillStyle="#fff";x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fill();});
  if(t-shot>300){bls.push({x:ship.x+ship.w/2-3,y:ship.y,w:6,h:18,v:14});shot=t;}
  bls.forEach((b,i)=>{b.y-=b.v;if(b.y<-20)bls.splice(i,1);x.fillStyle="#adf";x.fillRect(b.x,b.y,b.w,b.h);});
  ens.forEach((e,i)=>{
    e.y+=e.vy;e.rot+=e.rs;
    x.save();x.translate(e.x+e.r,e.y+e.r);x.rotate(e.rot);
    x.beginPath();x.moveTo(e.pts[0].x,e.pts[0].y);
    e.pts.forEach(p=>x.lineTo(p.x,p.y));x.closePath();
    x.fillStyle="#7a6a50";x.fill();x.strokeStyle="#bba";x.lineWidth=1.5;x.stroke();
    x.restore();
    bls.forEach((b,bi)=>{if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){ens.splice(i,1);bls.splice(bi,1);pts+=10;m.innerText="Puntos: "+pts;}});
    if(e.y>c.height)ens.splice(i,1);
  });
  // Nave
  x.save();x.translate(ship.x+ship.w/2,ship.y+ship.h/2);
  x.beginPath();x.moveTo(0,-ship.h/2);x.lineTo(ship.w/2,ship.h/2);x.lineTo(-ship.w/2,ship.h/2);x.closePath();
  x.fillStyle="#2244cc";x.fill();x.strokeStyle="#6699ff";x.lineWidth=1.5;x.stroke();
  x.beginPath();x.ellipse(0,-5,7,9,0,0,Math.PI*2);x.fillStyle="#88ccff";x.fill();
  x.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
