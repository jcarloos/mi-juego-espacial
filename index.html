<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mente+ Espacial</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; }
        canvas { display: block; background: radial-gradient(circle, #1b2735 0%, #090a0f 100%); }
        #p { position: absolute; top: 15px; left: 15px; color: #FFF; font-size: 24px; font-family: sans-serif; font-weight: bold; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="p">MENTE+ Puntos: 0</div>
    <canvas id="j"></canvas>
    <script>
        const c = document.getElementById("j"), x = c.getContext("2d"), m = document.getElementById("p");
        c.width = window.innerWidth; c.height = window.innerHeight;
        const stars = [];
        for(let i=0; i<100; i++) stars.push({x: Math.random()*c.width, y: Math.random()*c.height, s: Math.random()*2});
        const iN = new Image(), iA = new Image();
        iN.src = 'https://i.imgur.com/64mEB9W.png';
        iA.src = 'https://i.imgur.com/pZ8vG3v.png'
        let pts = 0, j = {x: c.width/2-30, y: c.height-120, w: 60, h: 60}, bls = [], ens = [];
        function crearE() { ens.push({x: Math.random()*(c.width-40), y: -40, w: 45, h: 45, v: 4}); }
        setInterval(crearE, 800); 
        c.addEventListener("touchstart", (e) => { bls.push({x: j.x+27, y: j.y, w: 6, h: 15, v: 12}); e.preventDefault(); });
        c.addEventListener("touchmove", (e) => { j.x = e.touches[0].clientX-30; e.preventDefault(); });
        function loop() {
            x.clearRect(0,0,c.width,c.height);
            x.fillStyle = "white";
            stars.forEach(s => x.fillRect(s.x, s.y, s.s, s.s));
            x.drawImage(iN, j.x, j.y, j.w, j.h);
            bls.forEach((b,i)=>{ x.fillStyle="#FF0"; x.fillRect(b.x,b.y,b.w,b.h); b.y-=b.v; if(b.y<-20) bls.splice(i,1); });
            ens.forEach((e,i)=>{ 
                e.y+=e.v; x.drawImage(iA, e.x, e.y, e.w, e.h);
                bls.forEach((b,bi)=>{
                    if(b.x<e.x+e.w && b.x+b.w>e.x && b.y<e.y+e.h && b.y+b.h>e.y){
                        ens.splice(i,1); bls.splice(bi,1); pts+=20; m.innerText="MENTE+ Puntos: "+pts;
                    }
                });
                if(e.y>c.height) ens.splice(i,1);
            });
            requestAnimationFrame(loop);
        }
        iN.onload = iA.onload = loop;
    </script>
</body>
</html>
